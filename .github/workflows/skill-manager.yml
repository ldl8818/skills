name: skill-manager

on:
  push:
    paths:
      - "skill-manager/**"
      - ".github/workflows/skill-manager.yml"
  pull_request:
    paths:
      - "skill-manager/**"
      - ".github/workflows/skill-manager.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit and isolated CLI tests
        working-directory: skill-manager
        run: python -m unittest discover -s tests -v
      - name: Compile scripts
        working-directory: skill-manager
        run: python -m compileall -q scripts
      - name: Public-repository redline scan
        # Only generic patterns here: this file is public, so project-specific
        # forbidden words must stay in the maintainer's local word list.
        run: '! grep -RInE "/Users/|dylan" skill-manager --exclude-dir=__pycache__'
